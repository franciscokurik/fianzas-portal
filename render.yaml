# Blueprint de Render para el Portal de Fianzas Fortex.
# Despliega un único servicio web: Express sirve la API y la app de React
# ya compilada (client/dist). Los datos demo se siembran solos si la BD
# está vacía (ver server/src/index.js).
services:
  - type: web
    name: fianzas-portal
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      # node:sqlite requiere Node >= 22.5; usamos 24 (igual que en local).
      - key: NODE_VERSION
        value: "24"
      # Secreto para firmar los JWT; Render genera un valor aleatorio seguro.
      - key: JWT_SECRET
        generateValue: true
